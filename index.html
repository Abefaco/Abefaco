<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBEFC 2026 - Início</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --azul: #0054A6; --branco: #ffffff; }
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .bg { background-image: url('fundo-maceio.png'); height: 100%; background-size: cover; background-position: center; position: relative; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 84, 166, 0.4); display: flex; justify-content: center; align-items: start; padding-top: 10vh; }
        
        .search-box { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; }
        .logo { width: 150px; margin-bottom: 20px; }
        
        input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 30px; font-size: 1rem; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--azul); }
        
        #areaSenha { display: none; margin-top: 15px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Lista de Resultados Dinâmicos */
        #resultados { margin-top: 20px; text-align: left; max-height: 400px; overflow-y: auto; }
        .result-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; transition: 0.2s; }
        .result-item:hover { background: #f0f7ff; }
        .info b { color: var(--azul); display: block; font-size: 0.9rem; }
        .info small { color: #666; font-size: 0.8rem; }
        .btn-play { background: #2e7d32; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="bg">
    <div class="overlay">
        <div class="search-box">
            <img src="logo.png" alt="ABEFACO" class="logo">
            <input type="text" id="campoBusca" placeholder="Pesquise por ID, Título ou Autor..." oninput="filtrarTrabalhos()">
            
            <!-- Campo de Senha Oculto -->
            <div id="areaSenha">
                <p style="color: var(--azul); font-weight: bold; margin-bottom: 10px;">Acesso Restrito Detectado</p>
                <input type="password" id="senhaAdmin" placeholder="Digite a senha do avaliador">
                <button onclick="loginAdmin()" style="margin-top: 10px; background: var(--azul); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; width: 100%;">Entrar no Painel</button>
            </div>

            <div id="resultados"></div>
        </div>
    </div>
</div>

<script>
    let db = [];
    const ADMIN_EMAIL = "abefaco@gmail.com";
    const SENHA_CORRETA = "092026"; // Altere para a senha desejada

    // Pré-carrega o CSV para a busca ser instantânea
    Papa.parse("database.csv", {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: (res) => { db = res.data; }
    });

    function filtrarTrabalhos() {
        const termo = document.getElementById('campoBusca').value.trim().toLowerCase();
        const areaSenha = document.getElementById('areaSenha');
        const container = document.getElementById('resultados');
        
        container.innerHTML = "";

        if (termo === ADMIN_EMAIL) {
            areaSenha.style.display = "block";
            return;
        } else {
            areaSenha.style.display = "none";
        }

        if (termo.length < 2) return;

        const filtrados = db.filter(r => 
            String(r.Número).toLowerCase().includes(termo) ||
            String(r.Título).toLowerCase().includes(termo) ||
            String(r.Autores).toLowerCase().includes(termo)
        ).slice(0, 10); // Mostra os 10 primeiros para não travar

        filtrados.forEach(r => {
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `
                <div class="info">
                    <b>${r.Título.substring(0, 50)}...</b>
                    <small>ID: ${r.Número} | ${r.Autores.substring(0, 40)}</small>
                </div>
                <button class="btn-play" onclick="abrirTrabalho('${r.Número}')">PLAY</button>
            `;
            container.appendChild(div);
        });
    }

    function abrirTrabalho(id) {
        localStorage.setItem('trabalhoAtivo', JSON.stringify({ Número: id, modoApresentacao: true }));
        window.location.href = "dashboard.html";
    }

    function loginAdmin() {
        const senha = document.getElementById('senhaAdmin').value;
        if (senha === SENHA_CORRETA) {
            localStorage.setItem('trabalhoAtivo', JSON.stringify({ Número: "ADMIN", modoApresentacao: false }));
            window.location.href = "dashboard.html";
        } else {
            alert("Senha incorreta!");
        }
    }
</script>
</body>
</html>

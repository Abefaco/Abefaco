<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de e-Posters - ABEFACO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --azul: #0054A6; --verde: #4FB848; --laranja: #F9A825; --cinza: #f4f7f6;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--cinza); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 12px; shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-top: 8px solid var(--azul); }
        .logo { text-align: center; color: var(--azul); font-weight: bold; font-size: 24px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--verde); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #3e9139; }
        #mensagem { margin-top: 15px; font-size: 13px; text-align: center; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">ABEFACO</div>
    <h2 style="text-align:center; color: var(--azul); font-size: 18px;">ValidańŃo de Trabalho</h2>
    
    <div class="form-group">
        <label>E-mail do Autor</label>
        <input type="email" id="email" placeholder="seu@email.com">
    </div>
    <div class="form-group">
        <label>C¾digo do Trabalho (N·mero)</label>
        <input type="text" id="codigo" placeholder="Ex: 1417232">
    </div>
    
    <button onclick="autenticar()">Acessar Trabalho</button>
    <div id="mensagem"></div>
</div>

<script src="script.js"></script>
</body>
</html>

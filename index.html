<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CBEFC 2026</title>
    <style>
        :root { --azul: #0054A6; --branco: #ffffff; }
        
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* Container do Fundo com a Imagem */
        .bg-container {
            background-image: url('fundo-maceio.png'); /* Nome da sua imagem */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Camada de Transparência (Overlay) */
        .bg-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 84, 166, 0.4); /* Azul do evento com 40% de opacidade */
            z-index: 1;
        }

        /* Cartão de Login (Janela por cima) */
        .login-card {
            background: rgba(255, 255, 255, 0.95); /* Branco quase opaco */
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 360px;
            text-align: center;
            z-index: 10; /* Garante que fique por cima de tudo */
            border-top: 6px solid var(--azul);
            backdrop-filter: blur(5px); /* Efeito de vidro embaçado leve */
        }

        .login-card img { max-width: 160px; margin-bottom: 25px; }
        .login-card h3 { color: var(--azul); margin-top: 0; margin-bottom: 20px; }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; color: var(--azul); font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        
        input {
            width: 100%;
            padding: 12px 15px;
            margin: 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: 0.3s;
        }
        input:focus { border-color: var(--azul); outline: none; box-shadow: 0 0 8px rgba(0,84,166,0.2); }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--azul);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 17px;
            margin-top: 15px;
            transition: 0.3s;
        }
        button:hover { background-color: #003d7a; transform: translateY(-2px); }

        #areaSenha { display: none; margin-top: 10px; }
        
        .footer-creditos { position: absolute; bottom: 10px; color: white; z-index: 10; font-size: 0.8rem; opacity: 0.8; }
    </style>
</head>
<body>

<div class="bg-container">
    <div class="bg-overlay"></div>
    
    <div class="login-card">
        <img src="logo.png" alt="CBEFC 2026">
        <h3>Acesso ao Sistema</h3>
        
        <div class="input-group">
            <label for="usuarioID">ID do Trabalho ou E-mail</label>
            <input type="text" id="usuarioID" placeholder="Ex: 1417232" oninput="monitorarAdmin(this.value)">
        </div>
        
        <div id="areaSenha" class="input-group">
            <label for="senhaAdmin">Senha Administrativa</label>
            <input type="password" id="senhaAdmin" placeholder="******">
        </div>

        <button onclick="tentarLogin()">Entrar</button>
    </div>
    
    <div class="footer-creditos">Foto: Maceió, Alagoas - Local do Evento</div>
</div>

<script>
    // Se já estiver logado, envia para o dashboard
    if(localStorage.getItem('trabalhoAtivo')) { window.location.href = "dashboard.html"; }

    function monitorarAdmin(valor) {
        const areaSenha = document.getElementById('areaSenha');
        // Verifica se é o e-mail do admin para mostrar o campo da senha
        if (valor.trim().toLowerCase() === "abefaco@gmail.com") {
            areaSenha.style.display = "block";
        } else {
            areaSenha.style.display = "none";
        }
    }

    function tentarLogin() {
        const idRaw = document.getElementById('usuarioID').value;
        const id = idRaw.trim();
        const senha = document.getElementById('senhaAdmin').value;

        if (id === "") { alert("Por favor, informe seu ID."); return; }

        // Lógica Administrativa
        if (id.toLowerCase() === "abefaco@gmail.com") {
            if (senha === "092026") {
                localStorage.setItem('trabalhoAtivo', JSON.stringify({ Número: "ADMIN" }));
                window.location.href = "dashboard.html";
            } else {
                alert("Senha administrativa incorreta!");
            }
            return;
        }

        // Lógica de Autor/Apresentador (Entra direto com o ID)
        // Guardamos o ID puro para buscar no CSV e na pasta de posters
        localStorage.setItem('trabalhoAtivo', JSON.stringify({ Número: id }));
        window.location.href = "dashboard.html";
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBEFC 2026 - Consulta de Trabalhos</title>
    <style>
        :root { 
            --azul: #0054A6; 
            --branco: #ffffff; 
            --sombra: rgba(0, 0, 0, 0.2);
        }

        body, html { 
            height: 100%; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden;
        }

        /* Fundo com imagem de Maceió */
        .bg-image {
            background-image: url('fundo-maceio.png');
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            position: relative;
        }

        /* Overlay Azul Translúcido (Identidade Visual) */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 84, 166, 0.4); /* Azul Abefaco com 40% de opacidade */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Caixa de Busca Centralizada */
        .login-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px var(--sombra);
            text-align: center;
            width: 100%;
            max-width: 450px;
            border-bottom: 5px solid var(--azul);
        }

        .logo {
            width: 180px;
            margin-bottom: 25px;
        }

        h2 {
            color: var(--azul);
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        p {
            color: #555;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .search-container {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 30px; /* Estilo Google */
            outline: none;
            font-size: 1rem;
            transition: border-color 0.3s;
            box-sizing: border-box;
            text-align: center;
        }

        input[type="text"]:focus {
            border-color: var(--azul);
            box-shadow: 0 0 10px rgba(0, 84, 166, 0.2);
        }

        .btn-search {
            width: 100%;
            padding: 15px;
            background-color: var(--azul);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        .btn-search:hover {
            background-color: #003d7a;
            transform: translateY(-2px);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="bg-image">
        <div class="overlay">
            <div class="login-box">
                <img src="logo.png" alt="Logo CBEFC" class="logo">
                <h2>Consulta de Trabalhos</h2>
                <p>Busque por ID, Título, Autor ou E-mail</p>

                <div class="search-container">
                    <input type="text" id="campoBusca" placeholder="O que você procura?" onkeypress="checkEnter(event)">
                </div>

                <button class="btn-search" onclick="executarAcesso()">Pesquisar no Congresso</button>

                <div class="footer-text">
                    Associação Brasileira de Enfermagem de Família e Comunidade (ABEFACO)
                </div>
            </div>
        </div>
    </div>

    <script>
        // Função para permitir busca ao apertar "Enter"
        function checkEnter(e) {
            if (e.key === 'Enter') {
                executarAcesso();
            }
        }

        function executarAcesso() {
            const valor = document.getElementById('campoBusca').value.trim();

            if (!valor) {
                alert("Por favor, digite um termo para a pesquisa.");
                return;
            }

            // Lógica de Redirecionamento
            if (valor.toLowerCase() === "abefaco@gmail.com") {
                // Acesso restrito para Administração
                localStorage.setItem('trabalhoAtivo', JSON.stringify({ 
                    Número: "ADMIN", 
                    modoApresentacao: false 
                }));
            } else {
                // Acesso Público: Qualquer outro termo é tratado como busca global
                localStorage.setItem('trabalhoAtivo', JSON.stringify({ 
                    Número: valor, 
                    modoApresentacao: false 
                }));
            }

            // Redireciona para o Dashboard que agora processa a busca
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CBEFC 2026</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; border-top: 5px solid #0054A6; }
        img { max-width: 150px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #0054A6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background: #003d7a; }
        #campoSenha { display: none; } /* Escondido por padrão */
    </style>
</head>
<body>

<div class="login-card">
    <img src="logo.png" alt="Logo">
    <h3>Acesso ao Sistema</h3>
    
    <input type="text" id="usuarioID" placeholder="ID do Trabalho ou E-mail" oninput="verificarAdmin(this.value)">
    
    <div id="campoSenha">
        <input type="password" id="senhaAdmin" placeholder="Senha Administrativa">
    </div>

    <button onclick="realizarLogin()">Entrar</button>
</div>

<script>
    function verificarAdmin(valor) {
        const campoSenha = document.getElementById('campoSenha');
        if (valor.trim().toLowerCase() === "abefaco@gmail.com") {
            campoSenha.style.display = "block";
        } else {
            campoSenha.style.display = "none";
        }
    }

    function realizarLogin() {
        const id = document.getElementById('usuarioID').value.trim();
        const senha = document.getElementById('senhaAdmin').value;

        if (id === "") {
            alert("Por favor, insira um ID válido.");
            return;
        }

        // Lógica para Admin
        if (id.toLowerCase() === "abefaco@gmail.com") {
            if (senha === "092026") {
                localStorage.setItem('trabalhoAtivo', JSON.stringify({ Número: "ADMIN" }));
                window.location.href = "dashboard.html";
            } else {
                alert("Senha administrativa incorreta!");
            }
            return;
        }

        // Lógica para Autor (Qualquer outro ID)
        localStorage.setItem('trabalhoAtivo', JSON.stringify({ Número: id }));
        window.location.href = "dashboard.html";
    }
</script>

</body>
</html>

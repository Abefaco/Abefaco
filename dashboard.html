<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Autor - ABEFACO</title>
    <style>
        :root {
            --azul-abefaco: #0054A6;
            --dourado-abefaco: #F9A825;
            --bg: #f4f7f6;
            --header-height: 80px;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding-top: var(--header-height); 
        }

        /* Cabeçalho Fixo */
        header { 
            background: white; 
            color: var(--azul-abefaco); 
            padding: 0 30px; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: var(--header-height);
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            z-index: 1000;
            box-sizing: border-box;
            border-bottom: 3px solid var(--azul-abefaco);
        }
        .logo-area { display: flex; align-items: center; }
        .logo-interna { height: 55px; width: auto; margin-right: 15px; }
        .app-title { font-size: 16px; font-weight: 700; color: #333; text-transform: uppercase; }

        .btn-sair { 
            background: transparent; 
            border: 2px solid #ff4444; 
            color: #ff4444; 
            padding: 8px 18px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-sair:hover { background: #ff4444; color: white; }

        /* Conteúdo */
        .container { padding: 30px; max-width: 1100px; margin: 0 auto; }
        .card-info { 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            margin-bottom: 25px; 
            border-left: 8px solid var(--dourado-abefaco);
        }
        .titulo-trabalho { font-size: 22px; font-weight: 800; color: var(--azul-abefaco); margin: 0 0 10px 0; line-height: 1.3; }
        .autor-nome { color: #666; font-size: 15px; margin: 0; }

        /* Área do PDF */
        .poster-wrapper { 
            background: #e9ecef; 
            border-radius: 15px; 
            height: 70vh; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            border: 2px dashed #ccc;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* Botão de Upload Customizado */
        .upload-box { text-align: center; padding: 20px; }
        .btn-upload {
            display: inline-block;
            background: var(--azul-abefaco);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s;
            box-shadow: 0 4px 12px rgba(0,84,166,0.3);
        }
        .btn-upload:hover { background: var(--dourado-abefaco); transform: scale(1.05); }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <img src="logo.png" alt="Logo ABEFACO" class="logo-interna">
        <div class="app-title">II Congresso Brasileiro | Painel do Autor</div>
    </div>
    <button class="btn-sair" onclick="sair()">Sair</button>
</header>

<div class="container">
    <div class="card-info">
        <h1 class="titulo-trabalho" id="txtTitulo">Carregando título...</h1>
        <p class="autor-nome">ID do Trabalho: <span id="txtID" style="font-weight: bold; color: var(--azul-abefaco);">---</span></p>
    </div>

    <div class="poster-wrapper" id="displayArea">
        <p style="color: #999;">Verificando arquivo PDF...</p>
    </div>
</div>

<script>
    // 1. Recupera os dados salvos no login
    var dados = JSON.parse(localStorage.getItem('trabalhoAtivo'));

    // 2. Segurança: se não logou, volta para o início
    if (!dados) {
        window.location.href = "index.html";
    } else {
        // Preenche as informações na tela
        document.getElementById('txtTitulo').innerText = dados.Título;
        document.getElementById('txtID').innerText = dados.Número;

        // 3. Define o caminho do PDF (pasta posters/ID.pdf)
        var caminhoPDF = 'posters/' + String(dados.Número).trim() + '.pdf';
        var area = document.getElementById('displayArea');

        // 4. Checa se o PDF existe no servidor (GitHub)
        fetch(caminhoPDF, { method: 'HEAD' }).then(function(resposta) {
            if (resposta.ok) {
                // PDF ENCONTRADO: Exibe no Iframe
                area.innerHTML = '<iframe src="' + caminhoPDF + '#toolbar=0"></iframe>';
                area.style.border = "none";
            } else {
                // PDF NÃO ENCONTRADO: Exibe opção de Upload
                area.innerHTML = `
                    <div class="upload-box">
                        <img src="logo.png" style="width:70px; opacity:0.3; margin-bottom:15px;">
                        <h2 style="color:#555; margin:0;">Arquivo não disponível</h2>
                        <p style="color:#777; margin:10px 0;">O e-Poster para este trabalho ainda não foi enviado ou processado.</p>
                        
                        <a href="https://forms.gle/oohhs5GEgpzv3bDV9" target="_blank" class="btn-upload">
                            📤 ENVIAR MEU PDF AGORA
                        </a>
                        
                        <p style="font-size:12px; color:#aaa; margin-top:15px;">
                            Dica: O arquivo deve ser nomeado como <strong>${dados.Número}.pdf</strong>
                        </p>
                    </div>
                `;
            }
        }).catch(function() {
            area.innerHTML = "<p>Erro ao verificar base de arquivos.</p>";
        });
    }

    // Função para encerrar sessão
    function sair() {
        localStorage.removeItem('trabalhoAtivo');
        window.location.href = "index.html";
    }
</script>

</body>
</html>

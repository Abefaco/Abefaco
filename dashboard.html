<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Autor - ABEFACO</title>
    <style>
        :root {
            --azul-abefaco: #0054A6;
            --dourado-abefaco: #F9A825;
            --bg: #f4f7f6;
            --header-height: 80px;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding-top: var(--header-height); /* Espaço para o cabeçalho fixo */
        }
        /* Cabeçalho Fixo com a Logo no Canto Superior Esquerdo */
        header { 
            background: white; 
            color: var(--azul-abefaco); 
            padding: 0 30px; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: var(--header-height);
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            z-index: 1000;
            box-sizing: border-box;
            border-bottom: 3px solid var(--azul-abefaco);
        }
        .logo-area {
            display: flex;
            align-items: center;
        }
        .logo-interna { 
            height: 60px; /* Altura controlada para caber no cabeçalho */
            width: auto;
            margin-right: 15px;
        }
        .app-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }
        button#btnSair { 
            background: transparent; 
            border: 2px solid var(--azul-abefaco); 
            color: var(--azul-abefaco); 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }
        button#btnSair:hover { 
            background: var(--azul-abefaco); 
            color: white; 
        }
        /* Conteúdo Principal */
        .container { padding: 40px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 12px; shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .titulo-trabalho { font-size: 24px; font-weight: 800; color: var(--azul-abefaco); margin: 0; }
        .visualizador-container { height: 75vh; border: 2px solid #ddd; border-radius: 8px; overflow: hidden; background: #eee; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <img src="logo.png" alt="Logo ABEFACO" class="logo-interna">
        <span class="app-title">II Congresso Brasileiro | e-Poster</span>
    </div>
    <button id="btnSair" onclick="sair()">Sair</button>
</header>

<div class="container">
    <div class="card">
        <h1 class="titulo-trabalho" id="trabalhoTitulo">Título do Trabalho</h1>
        <p style="color: #666; margin-bottom: 0;">Autor(a): <span id="autorNome" style="font-weight:600; color:#333;">...</span></p>
    </div>

    <div class="visualizador-container" id="posterArea">
        </div>
</div>

<script>
    // Recupera os dados salvos no login (se houver)
    var dados = JSON.parse(localStorage.getItem('trabalhoAtivo'));

    if (!dados) {
        // Se não houver dados, redireciona para o login por segurança
        window.location.href = "index.html";
    } else {
        // Preenche o layout com as informações reais
        document.getElementById('trabalhoTitulo').textContent = dados.Título;
        
        // Separa o primeiro autor (o Even3 envia uma lista separada por vírgula)
        var primeiroAutor = dados.Autores.split(',')[0];
        document.getElementById('autorNome').textContent = primeiroAutor;

        // Tenta carregar o PDF da pasta /posters com o número do trabalho
        var pdfPath = 'posters/' + String(dados.Número).trim() + '.pdf';
        
        var viewerArea = document.getElementById('posterArea');
        
        // Usa o fetch para checar se o PDF existe antes de tentar carregar
        fetch(pdfPath, { method: 'HEAD' }).then(function(res) {
            if (res.ok) {
                // Se existe, carrega no iframe
                viewerArea.innerHTML = '<iframe src="' + pdfPath + '#toolbar=0" title="Visualizador do e-Poster"></iframe>';
            } else {
                // Se não existe, mostra mensagem amigável
                viewerArea.innerHTML = '<div style="display:flex; justify-content:center; align-items:center; height:100%; font-size:18px; color:#555; text-align:center; padding:20px;">' +
                                      'PDF do e-Poster ainda não disponível para este trabalho.<br><br>Por favor, aguarde a publicação oficial.</div>';
            }
        });
    }

    function sair() {
        // Limpa a sessão e volta ao login
        localStorage.removeItem('trabalhoAtivo');
        window.location.href = "index.html";
    }
</script>
</body>
</html>

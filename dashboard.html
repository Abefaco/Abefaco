<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema CBEFC 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --azul: #0054A6; --fundo: #f4f7f6; --branco: #ffffff; --verde: #2e7d32; --vermelho: #d32f2f; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--fundo); padding-top: 80px; }
        header { background: var(--branco); height: 70px; position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 1000; border-bottom: 4px solid var(--azul); box-sizing: border-box; }
        .container { max-width: 1200px; margin: 0 auto; padding: 10px; }
        .pdf-wrapper { width: 100%; height: 80vh; background: #525659; border-radius: 8px; border: none; }
        .btn-ui { padding: 10px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; color: white; }
        
        /* Admin Styles */
        .admin-controls { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        .admin-controls input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; flex: 1; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: var(--azul); color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .btn-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #ccc; cursor: pointer; transition: 0.3s; }
        .btn-check.checked { background: var(--verde); border-color: var(--verde); position: relative; }
        .btn-check.checked::after { content: 'L'; color: white; transform: scaleX(-1) rotate(-35deg); position: absolute; left: 6px; top: 2px; }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="Logo" style="height: 40px;">
    <div id="statusHeader" style="font-weight: bold; color: var(--azul);">A validar...</div>
    <div>
        <button id="btnVoltar" style="display:none; background:#666;" class="btn-ui" onclick="voltarAdmin()">Painel</button>
        <button style="background:var(--vermelho); margin-left:10px;" class="btn-ui" onclick="sair()">Sair</button>
    </div>
</header>

<div class="container" id="mainContent">
    <div style="text-align:center; margin-top: 100px;">
        <h2>A carregar trabalho...</h2>
        <p>Se demorar muito, verifique a sua ligação.</p>
    </div>
</div>

<script>
    const CONFIG = {
        script: "https://script.google.com/macros/s/AKfycbydKeg03byP8XkxiC8LAkLbtpxN9WnLQLZu2XmlI4Fhvnj_HrVUOJGIXsYPfn2VspokXw/exec",
        database: "database.csv"
    };

    let sessao = JSON.parse(localStorage.getItem('trabalhoAtivo'));
    if (!sessao) window.location.href = "index.html";

    const idAtivo = sessao.modoApresentacao ? sessao.idSelecionado : sessao.Número;
    const isAdmin = sessao.Número === "ADMIN" && !sessao.modoApresentacao;

    // 1. EXECUÇÃO IMEDIATA (Prioridade Máxima)
    window.onload = () => {
        if (!isAdmin) {
            document.getElementById('statusHeader').innerText = "Trabalho ID: " + idAtivo;
            if(sessao.modoApresentacao) document.getElementById('btnVoltar').style.display = "inline-block";
            carregarVisualizador(idAtivo);
        }
        processarDados();
    };

    // 2. CARREGAR PDF (Sem depender de CSV ou Planilha)
    function carregarVisualizador(id) {
        const urlPDF = `posters/${id}.pdf`;
        const container = document.getElementById('mainContent');

        fetch(urlPDF, { method: 'HEAD' }).then(res => {
            if (res.ok) {
                container.innerHTML = `
                    <iframe src="${urlPDF}?v=${Math.random()}" class="pdf-wrapper"></iframe>
                `;
            } else {
                const forms = `https://docs.google.com/forms/d/e/1FAIpQLSd6X6QqSvTAFbpl91uWaYqtuArEQ2V9D0h2MZX_jtrT8gkSbQ/viewform?embedded=true&entry.1292953747=${id}`;
                container.innerHTML = `
                    <div style="text-align:center; padding: 20px; background: #fffbe6; border: 1px solid #ffe58f; border-radius: 8px;">
                        <h3>Arquivo não detetado na pasta /posters</h3>
                        <p>ID: <b>${id}</b> | Por favor, submeta o PDF pelo formulário abaixo:</p>
                        <iframe src="${forms}" width="100%" height="600px" style="border:none; background:white;"></iframe>
                    </div>
                `;
            }
        }).catch(() => {
            container.innerHTML = `<iframe src="${urlPDF}" class="pdf-wrapper"></iframe>`;
        });
    }

    // 3. PROCESSAR DADOS (Admin e Títulos)
    async function processarDados() {
        let notas = [];
        try {
            const resp = await fetch(CONFIG.script);
            notas = await resp.json();
        } catch(e) {}

        Papa.parse(CONFIG.database, {
            download: true, header: true, skipEmptyLines: true,
            complete: (results) => {
                results.data.forEach(row => { 
                    const id = String(row.Número).trim();
                    if(id) bancoDeDadosCompleto[id] = row; 
                });

                if (isAdmin) {
                    document.getElementById('statusHeader').innerText = "PAINEL ADMIN";
                    renderizarAdmin(results.data, notas);
                }
            }
        });
    }

    function renderizarAdmin(lista, notas) {
        const container = document.getElementById('mainContent');
        container.innerHTML = `
            <div class="admin-controls">
                <input type="text" id="busca" onkeyup="filtrar()" placeholder="Procurar ID ou Título...">
                <select id="fMod" onchange="filtrar()"><option value="todos">Todas Modalidades</option><option value="Oral">Oral</option><option value="e-Poster">e-Poster</option></select>
            </div>
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr><th>Pres.</th><th>ID</th><th>Título</th><th>Ações</th></tr></thead>
                    <tbody id="tabelaCorpo"></tbody>
                </table>
            </div>
        `;

        const tbody = document.getElementById('tabelaCorpo');
        lista.forEach(row => {
            const id = String(row.Número).trim();
            if(!id) return;
            const nota = notas.find(n => n.id === id);
            const presente = nota ? nota.presenca : false;

            const tr = document.createElement('tr');
            tr.setAttribute('data-mod', (row.modalidade || "").includes('Oral') ? 'Oral' : 'e-Poster');
            tr.innerHTML = `
                <td><div class="btn-check ${presente ? 'checked' : ''}" onclick="marcarPresenca('${id}')"></div></td>
                <td><b>${id}</b></td>
                <td>${row.Título || "Sem título"}</td>
                <td>
                    <button class="btn-ui" style="background:var(--verde)" onclick="play('${id}')">Play</button>
                    ${presente ? `<button class="btn-ui" style="background:var(--azul); margin-left:5px;" onclick="avaliar('${id}')">Nota</button>` : ''}
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // FUNÇÕES DE BOTÃO
    async function marcarPresenca(id) {
        const payload = { tipo: "PRESENCA", id: id, status: true };
        await fetch(CONFIG.script, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        location.reload();
    }

    function play(id) {
        localStorage.setItem('trabalhoAtivo', JSON.stringify({ Número: "ADMIN", idSelecionado: id, modoApresentacao: true }));
        location.reload();
    }

    function voltarAdmin() {
        localStorage.setItem('trabalhoAtivo', JSON.stringify({ Número: "ADMIN", modoApresentacao: false }));
        location.reload();
    }

    function sair() { localStorage.removeItem('trabalhoAtivo'); window.location.href = "index.html"; }

    function filtrar() {
        const val = document.getElementById('busca').value.toLowerCase();
        const mod = document.getElementById('fMod').value;
        document.querySelectorAll("tbody tr").forEach(tr => {
            const match = tr.innerText.toLowerCase().includes(val) && (mod === "todos" || tr.getAttribute('data-mod') === mod);
            tr.style.display = match ? "" : "none";
        });
    }
</script>
</body>
</html>
